# Language file for Solar server messages.
# Add new languages by creating a [xx] section with the same keys.
# %s = string, %d = number, %v = any value — standard fmt.Sprintf formatting.
# Key format: domain.feature.string (e.g. command.teleport.usage)

[en]
# ─── general ───
"general.muted" = "&cYou are muted."
"general.kicked" = "kicked"
"general.kicked_by" = "kicked by %s"
"general.banned_by" = "banned by %s"
"general.reconnected" = "reconnected from another client"
"general.invalid_username" = "invalid username"

# ─── server ───
"server.shutdown.msg" = "&cServer is shutting down..."
"server.shutdown.kick" = "&cServer is shutting down. Please reconnect later."

# ─── connect ───
"connect.whitelist_rejected" = "server is whitelisted"

# ─── command.teleport ───
"command.teleport.unavailable" = "teleport is unavailable"
"command.teleport.usage" = "usage: /tp x y z [yaw pitch]"
"command.teleport.failed" = "teleport failed"
"command.teleport.done" = "teleported to %d %d %d"

# ─── command.setspawn ───
"command.setspawn.unavailable" = "spawn update is unavailable"
"command.setspawn.usage" = "usage: /setspawn [x y z [yaw pitch]]"
"command.setspawn.failed" = "spawn update failed"
"command.setspawn.done" = "spawn set to %d %d %d"

# ─── command.save ───
"command.save.unavailable" = "save is unavailable"
"command.save.failed" = "save failed"
"command.save.queued" = "save queued"

# ─── command.kick ───
"command.kick.unavailable" = "kick is unavailable"
"command.kick.usage" = "usage: /kick name [reason...]"
"command.kick.done" = "kicked %s"
"command.kick.done_reason" = "kicked %s: %s"

# ─── command.ban ───
"command.ban.unavailable" = "ban is unavailable"
"command.ban.usage" = "usage: /ban name [reason...]"
"command.ban.failed" = "ban failed"
"command.ban.done" = "banned %s"
"command.ban.done_reason" = "banned %s: %s"

# ─── command.unban ───
"command.unban.unavailable" = "unban is unavailable"
"command.unban.usage" = "usage: /unban name"
"command.unban.not_banned" = "player not banned: %s"
"command.unban.done" = "unbanned %s"

# ─── command.newlvl ───
"command.newlvl.unavailable" = "world generation is unavailable"
"command.newlvl.usage" = "usage: /newlvl name theme width height length [seed]"
"command.newlvl.failed" = "level generation failed"
"command.newlvl.done" = "generated level %s (%s %dx%dx%d)"

# ─── command.whitelist ───
"command.whitelist.usage" = "usage: /whitelist [on|off|add|remove|list]"
"command.whitelist.unavailable" = "whitelist is unavailable"
"command.whitelist.enabled" = "whitelist enabled"
"command.whitelist.disabled" = "whitelist disabled"
"command.whitelist.already_on" = "whitelist already enabled"
"command.whitelist.already_off" = "whitelist already disabled"
"command.whitelist.add.usage" = "usage: /whitelist add name"
"command.whitelist.add.done" = "whitelisted %s"
"command.whitelist.add.already" = "player already whitelisted: %s"
"command.whitelist.remove.usage" = "usage: /whitelist remove name"
"command.whitelist.remove.done" = "removed %s from whitelist"
"command.whitelist.remove.not" = "player not whitelisted: %s"
"command.whitelist.list.none" = "whitelist: none"
"command.whitelist.list.items" = "whitelist: %s"
"command.whitelist.status.on" = "whitelist: on"
"command.whitelist.status.off" = "whitelist: off"

# ─── command.players ───
"command.players.none" = "players: none"
